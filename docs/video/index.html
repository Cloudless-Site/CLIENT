<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cloudless Video</title>
<style>
body {
    margin: 0;
    background: #0b0f0c;
    color: #d7ffd7;
    font-family: Arial, sans-serif;
}
.wrap {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px;
}
.card {
    background: #101710;
    border: 1px solid #284228;
    border-radius: 12px;
    padding: 20px;
}
h1 {
    margin: 0 0 12px 0;
    font-size: 28px;
}
p {
    margin: 0 0 16px 0;
    line-height: 1.5;
    color: #b8d8b8;
}
video {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 8px;
    background: #000;
}
.links {
    margin-top: 16px;
}
a {
    color: #8cff8c;
    text-decoration: none;
}
a:hover {
    text-decoration: underline;
}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
<h1>Cloudless architecture video</h1>
<p>Overview of the system design and runtime model.</p>
<video controls preload="metadata">
<source src="./cloudless.mp4" type="video/mp4">
Your browser does not support HTML5 video.
</video>
<div class="links">
<a href="./cloudless.mp4">Direct MP4 link</a>
</div>
</div>
</div>
</body>
</html>
